services:
  mysql:
    image: mysql:8.0
    container_name: pharmacy-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rahman
      MYSQL_DATABASE: pharmacy_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: pharmacy-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_HOSTNAME: eureka-server

  api-gateway:
    build:
      context: ./API-Gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-architect-evaluation-secure-key-1234567890123456}
    depends_on:
      eureka-server:
        condition: service_started

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_HOSTNAME: user-service
      DB_URL: jdbc:mysql://mysql:3306/pharmacy_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rahman
      JWT_SECRET: ${JWT_SECRET:-architect-evaluation-secure-key-1234567890123456}
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      EUREKA_URL: http://eureka-server:8761/eureka/
      EUREKA_HOSTNAME: order-service
      DB_URL: jdbc:mysql://mysql:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rahman
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  supplier-inventory-service:
    build:
      context: ./supplier-inventory-service
    container_name: supplier-inventory-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:mysql://mysql:3306/pharmacy_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rahman
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:mysql://mysql:3306/notification_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rahman
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      EUREKA_URL: http://eureka-server:8761/eureka/
      DB_URL: jdbc:mysql://mysql:3306/payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: rahman
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ${JWT_SECRET:-architect-evaluation-secure-key-1234567890123456}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_SkUT7TYdihPuCN}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-V6C0KvJ3x5g4df05mafrZVbq}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

volumes:
  mysql_data:
