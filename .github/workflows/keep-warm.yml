name: Keep Render Services Warm

on:
  schedule:
    # Every 10 minutes — Render free tier spins down after ~15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping all backend services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api-gateway
            url: https://api-gateway-xysq.onrender.com/actuator/health
          - name: user-service
            url: https://user-service-id7r.onrender.com/actuator/health
          - name: order-service
            url: https://order-service-l60x.onrender.com/orders/
          - name: payment-service
            url: https://payment-service-4w2d.onrender.com/payment/
          - name: inventory-service
            url: https://supplier-inventory-service.onrender.com/inventory/drug
          - name: notification-service
            url: https://notification-service-1636.onrender.com/notification?userId=keepalive
          - name: eureka-server
            url: https://eureka-server-3nyd.onrender.com/actuator/health
    steps:
      - name: Ping ${{ matrix.service.name }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 120 "${{ matrix.service.url }}")
          echo "${{ matrix.service.name }} → $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "000" ]; then
            echo "Failed to reach ${{ matrix.service.name }}"
            exit 1
          fi
