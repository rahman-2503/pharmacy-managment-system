# Server configuration
server.port=${SERVER_PORT:8082}
spring.application.name=ORDER-SERVICE

# Eureka client
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Database configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rahman}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Resilience4j Circuit Breaker - Inventory Service
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.inventoryService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=5

# Resilience4j Circuit Breaker - Payment Service
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=5

# Feign Client URLs (direct Render URLs - not Eureka lb://)
inventory.service.url=${INVENTORY_SERVICE_URL:https://supplier-inventory-service.onrender.com}
payment.service.url=${PAYMENT_SERVICE_URL:https://payment-service-4w2d.onrender.com}

# RabbitMQ
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}
spring.rabbitmq.ssl.algorithm=TLSv1.2

# Actuator endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
