# Server configuration
server.port=${SERVER_PORT:8081}
spring.application.name=user-service

# Eureka client configuration
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Database configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pharmacy_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rahman}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Actuator
management.endpoints.web.exposure.include=health

# JWT secret key
jwt.secret=${JWT_SECRET:architect-evaluation-secure-key-1234567890123456}
