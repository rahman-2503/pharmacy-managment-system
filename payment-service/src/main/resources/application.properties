server.port=${SERVER_PORT:8085}
spring.application.name=PAYMENT-SERVICE

# ✅ DB
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/payment_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rahman}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=10

# ✅ Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ✅ RabbitMQ
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}
spring.rabbitmq.ssl.algorithm=TLSv1.2

# ✅ Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SkUT7TYdihPuCN}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:V6C0KvJ3x5g4df05mafrZVbq}

# ✅ Feign Client URLs (direct Render URLs - not Eureka lb://)
order.service.url=${ORDER_SERVICE_URL:https://order-service-l60x.onrender.com}

# ✅ JWT (same as user service)
jwt.secret=${JWT_SECRET:architect-evaluation-secure-key-1234567890123456}
jwt.expiration=${JWT_EXPIRATION:86400000}
