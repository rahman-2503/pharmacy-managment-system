server.port=${SERVER_PORT:8080}
spring.application.name=api-gateway

spring.main.web-application-type=reactive

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ✅ ROUTES
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[2].id=inventory-service
spring.cloud.gateway.routes[2].uri=lb://SUPPLIER-INVENTORY-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/inventory/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payment/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/notification/**

# ✅ IMPORTANT FIX
spring.cloud.loadbalancer.ribbon.enabled=false

# ✅ HEADERS
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Request-Id,12345

# ✅ EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ✅ DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# ✅ JWT
jwt.secret=${JWT_SECRET:architect-evaluation-secure-key-1234567890123456}

# ✅ CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
