server.port=${SERVER_PORT:8080}
spring.application.name=api-gateway

spring.main.web-application-type=reactive

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ✅ ACTUATOR
management.endpoints.web.exposure.include=health,gateway

# Routes defined in ApiGatewayApplication.java (programmatic RouteLocator bean)
# using direct HTTPS URLs instead of lb:// for Render compatibility

# ✅ HEADERS
spring.cloud.gateway.default-filters[0]=AddRequestHeader=X-Request-Id,12345

# ✅ EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ✅ DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# ✅ JWT
jwt.secret=${JWT_SECRET:architect-evaluation-secure-key-1234567890123456}

# ✅ CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://pharmacy-frontend-b6j5.onrender.com}
